services:
  api:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    volumes:
      # Monte le code source de l'hôte dans le container.
      # Chaque modification est visible instantanément par cargo-watch.
      - ../../:/app

      # Volume nommé pour target/ — CRUCIAL pour les performances.
      # Sans ça, le dossier target/ (plusieurs Go) serait synchronisé
      # entre l'hôte et le container à travers le filesystem Docker,
      # ce qui est extrêmement lent sur macOS (osxfs/virtiofs).
      # Avec un volume nommé, target/ vit uniquement dans le container.
      - cargo-target:/app/target

      # Cache du registry cargo (évite de re-télécharger les crates)
      - cargo-registry:/usr/local/cargo/registry
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "50051:50051" # gRPC
      - "3000:3000" # HTTP (webhooks + health)
    environment:
      DATABASE_URL: postgres://ecommerce:dev_password@postgres:5432/ecommerce
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: product-images
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      JWT_SECRET: dev-secret-change-in-production-please
      JWT_ACCESS_TOKEN_DURATION_SECS: "900"
      JWT_REFRESH_TOKEN_DURATION_SECS: "604800"
      STRIPE_SECRET_KEY: sk_test_fake_for_dev
      STRIPE_WEBHOOK_SECRET: whsec_fake_for_dev
      GRPC_PORT: "50051"
      HTTP_PORT: "3000"
      RUST_LOG: debug,tower_http=debug,sqlx=warn,rdkafka=info
      # Token BSR pour régénérer le code proto dans le container
      BUF_TOKEN: ${BUF_TOKEN:-}
      # Force les couleurs dans les logs même dans Docker
      CARGO_TERM_COLOR: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # Pas de healthcheck en dev — cargo-watch redémarre souvent

    # === Base de données ===
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ecommerce" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # === Kafka (KRaft, sans Zookeeper) ===
  kafka:
    image: apache/kafka:3.7.1
    environment:
      # Mode KRaft : Kafka sans Zookeeper (simplifie le setup)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Création automatique des topics en dev
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9094:9094" # EXTERNAL listener pour l'hôte
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Kafka UI (monitoring des topics/messages) ===
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"

  # === Object Storage (compatible S3) ===
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Console web
    volumes:
      - miniodata:/data

  # Crée le bucket "product-images" au démarrage
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 minioadmin minioadmin; mc mb local/product-images --ignore-existing; exit 0; "

volumes:
  pgdata:
  kafkadata:
  miniodata: # Volumes pour les performances de compilation Rust dans Docker

  cargo-target: # Compilation cache — jamais synchronisé avec l'hôte
  cargo-registry: # Registry crates.io — téléchargé une seule fois
